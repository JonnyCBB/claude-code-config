<!-- VARIABLE: Chapter template — repeat for each prerequisite concept -->
<!-- Replace [N], [CONCEPT_ID], [CONCEPT_NAME], [ANALOGY], [EXPLANATION], [BRIDGE] -->

<div class="step" data-step="[N]" id="concept-[CONCEPT_ID]">
  <!-- Step counter -->
  <span class="step-counter">[N]</span>

  <!-- Analogy callout -->
  <div class="analogy-callout">
    <p>"[ANALOGY]"</p>
  </div>

  <!-- Concept heading -->
  <h3>[CONCEPT_NAME]</h3>

  <!-- Main explanation -->
  <p>[EXPLANATION]</p>

  <!-- Bridge to next concept (omit for final concept) -->
  <p class="bridge">[BRIDGE]</p>
</div>
